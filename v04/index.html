<!DOCTYPE html>
<html lang="pt-BR"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mu Finance v05.05</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121418">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script>
  // Registro do Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker registrado!', reg))
        .catch(err => console.log('Falha ao registrar SW', err));
    });
  }
</script>

		
		
<style>
    :root {
        --bg-main: #121418;
        --bg-card: #1E2128;
        --accent-blue: #38bdf8;
        --danger: #fb7185;
        --warning: #eab308;
        --success: #34d399;
        --accent-orange: #f97316;
    }
    
	
/* Controle de expansão dos submenus */
.max-height-0 {
    max-height: 0;
    transition: max-height 0.3s ease-out;
}

/* Garante que o painel lateral fique sobreposto a tudo */
#painel-outros {
    transition: right 0.3s ease-in-out;
	padding: 20px;
}

/* Efeito visual para quando o submenu está aberto */
.submenu-active {
    background-color: rgba(255, 255, 255, 0.05);
}
	
    /* VIEWPORT DINÂMICO */
    html, body { 
        height: 100vh; height: 100dvh; min-height: 100dvh; 
    }
    
    body { 
        background-color: #000; font-family: 'Inter', sans-serif; 
        -webkit-tap-highlight-color: transparent; color: white; 
        margin: 0; overflow: hidden;
    }
    
    /* CONTAINER PRINCIPAL */
    .app-container { 
        background-color: var(--bg-main); width: 100%; height: 100%; min-height: 100dvh;
        position: relative; display: flex; flex-direction: column;
    }
    
    /* HEADER - Mobile */
    header { flex-shrink: 0; padding: 10px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    
    /* MAIN - Área de conteúdo */
    main { 
        flex: 1; overflow-y: auto; overflow-x: hidden;
        padding-bottom: calc(130px + env(safe-area-inset-bottom));
        scroll-behavior: smooth;
    }
	
	
		/* Ajustes do Calendário de Saúde */
	.day-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; cursor: pointer; position: relative; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.05); }
	.day-circle:active { scale: 0.9; background: rgba(255,255,255,0.1); }
	.day-circle.goal-met { background: rgba(56, 189, 248, 0.2); border-color: #38bdf8; color: #38bdf8; }

	.dot { width: 4px; height: 4px; border-radius: 50%; margin: 0 1px; }
	.dot-agua { background-color: #38bdf8; }
	.dot-cafe { background-color: #eab308; }
	.dot-cafe-alert { background-color: #ef4444;
	}
    
    .card { background-color: var(--bg-card); border: 1px solid rgba(255,255,255,0.05); }
    ::-webkit-scrollbar { display: none; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .bubbles {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
    }
    .bubbles::before,
    .bubbles::after {
        content: "";
        position: absolute;
        bottom: -50%;
        width: 200%;
        height: 200%;
        background-repeat: repeat;
        animation: bubbleRise linear infinite;
        opacity: 0.25;
    }
    .bubbles::before {
        animation-duration: 6s;
        background-image:
            radial-gradient(circle at 20% 80%, white 6px, transparent 7px),
            radial-gradient(circle at 60% 70%, white 8px, transparent 9px),
            radial-gradient(circle at 40% 90%, white 5px, transparent 6px),
            radial-gradient(circle at 80% 85%, white 7px, transparent 8px);
    }
    .bubbles::after {
        animation-duration: 9s;
        opacity: 0.15;
        background-image:
            radial-gradient(circle at 30% 85%, white 5px, transparent 6px),
            radial-gradient(circle at 70% 75%, white 7px, transparent 8px),
            radial-gradient(circle at 50% 95%, white 6px, transparent 7px);
    }
    @keyframes bubbleRise {
        from { transform: translateY(0); }
        to { transform: translateY(-50%); }
    }
    .progress-fill {
        position: relative;
        overflow: hidden;
    }
    .sensitive-value.blurred { filter: blur(10px); transition: filter 0.3s ease; }
    
    /* OVERLAYS & BACKDROP */
    .overlay { 
        position: fixed; bottom: -100%; left: 0; width: 100%; height: 92%; 
        background-color: var(--bg-card); border-top-left-radius: 32px; border-top-right-radius: 32px; 
        z-index: 100; transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        box-shadow: 0 -10px 40px rgba(0,0,0,0.8); border-top: 1px solid rgba(255,255,255,0.1); 
        display: flex; flex-direction: column; 
    }
    .overlay.active { bottom: 0; }
    .overlay-content { flex: 1; overflow-y: auto; padding: 0 24px 40px 24px; }
    
    .backdrop { position: fixed; inset: 0; background-color: rgba(0,0,0,0.7); z-index: 90; display: none; }
    .backdrop.active { display: block; }

    .progress-ring__circle { transition: stroke-dashoffset 0.5s ease; transform: rotate(-90deg); transform-origin: 50% 50%; }
    .day-circle { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; position: relative; cursor: pointer; border: 1px solid #2d3139; color: #4b5563; font-weight: 700; transition: all 0.2s; }
    .day-circle.water-tracked { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(56, 189, 248, 0.05); }
    .day-circle.goal-met { background-color: var(--accent-blue); border-color: var(--accent-blue); color: #000; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
    
    /* NAVEGAÇÃO - Mobile (Sempre na base) */
    nav { 
        position: fixed; bottom: 0; left: 0; right: 0; width: 100%; 
        background-color: #16181D; border-top-left-radius: 32px; border-top-right-radius: 32px;
        display: flex; justify-content: space-between; align-items: center;
        padding: 5px 15px calc(15px + env(safe-area-inset-bottom)) 15px; 
        z-index: 80; box-shadow: 0 -10px 40px rgba(0,0,0,0.6); height: auto;
    }
    
    .nav-btn { 
        position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
        color: #6b7280; border: none; background: none; cursor: pointer; flex: 1; transition: all 0.2s; padding-top: 15px; height: 100%;
    }
    
    .nav-btn.active { color: var(--accent-blue); }
    .nav-btn span { font-size: 10px; font-weight: 600; margin-top: 4px; }
    
    .active-indicator { position: absolute; top: 0; width: 22px; height: 3px; background-color: var(--accent-blue); border-radius: 4px; opacity: 0; transform: scaleX(0); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .nav-btn.active .active-indicator { opacity: 1; transform: scaleX(1); }
    
    .sidebar-toggle-btn { display: none; }
    .sidebar-profile { display: none; }
    .sidebar-logo-container { display: none; } /* Oculto no Mobile */

    /* NAVEGAÇÃO - Desktop (Sidebar Lateral) */
    @media (min-width: 768px) {
        header { margin-left: 260px; padding: 20px 30px; transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        main { margin-left: 260px; padding-bottom: 20px; transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .overlay { left: 260px; width: calc(100% - 260px); transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1), bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .backdrop { left: 260px; width: calc(100% - 260px); transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Regras da Logo Desktop */
        .sidebar-logo-container { display: flex; margin-top: 50px; justify-content: center; }
        body.sidebar-collapsed .sidebar-logo-container { display: none !important; }

        nav {
            top: 0; bottom: 0; left: 0; right: auto; width: 260px; height: 100%; min-height: 100dvh;
            flex-direction: column; border-top-left-radius: 0; border-top-right-radius: 0;
            border-right: 1px solid rgba(255,255,255,0.05); 
            padding: 20px 16px; 
            justify-content: flex-start; align-items: stretch; border-top: none; 
            box-shadow: 10px 0 40px rgba(0,0,0,0.6);
            gap: 8px; 
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
        }
        
        .sidebar-toggle-btn {
            display: flex; align-items: center; justify-content: center;
            background: none; border: none; color: #6b7280; cursor: pointer; outline: none;
            transition: all 0.2s ease;
            position: absolute; top: 15px; right: 15px; z-index: 100;
            height: 40px; width: 40px; padding: 0; margin: 0;
        }
        .sidebar-toggle-btn:hover { color: white; background-color: rgba(255,255,255,0.05); border-radius: 8px; }
        
        .nav-btn { 
            flex: none; flex-direction: row; align-items: center; justify-content: flex-start; 
            padding: 0 16px; height: 44px; margin-bottom: 0; border-radius: 10px; 
            transition: all 0.2s ease; 
        }
        .nav-btn:hover { background-color: rgba(255,255,255,0.05); color: #ffffff; }
        .nav-btn.active { background-color: rgba(56, 189, 248, 0.08); color: var(--accent-blue); }
        .nav-btn span { margin-top: 0 !important; margin-left: 14px; font-size: 14px !important; font-weight: 600; white-space: nowrap; transition: opacity 0.2s; }
        
        .active-indicator { left: 0; top: 50%; transform: translateY(-50%) scaleY(0); width: 4px; height: 20px; border-radius: 0 4px 4px 0; }
        .nav-btn.active .active-indicator { transform: translateY(-50%) scaleY(1); }
    }
</style>

    <style>
        @media (max-width: 768px) {
            .hidden-mobile { display: none !important; }
        }
        @media (min-width: 768px) {
            .hidden-desktop { display: none !important; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1 id="header-title" class="text-xl font-bold">Bem-vindo!</h1>
        </header>

        <main id="main-content">
            <!-- Conteúdo principal será renderizado aqui -->
        </main>

        <nav id="navbar">
            <!-- Botões de navegação serão renderizados aqui -->
        </nav>
    </div>

<div id="overlay-outros" class="fixed inset-0 bg-black/60 z-40 hidden opacity-0 transition-opacity duration-300" onclick="toggleOutros()"></div>

<div id="painel-outros" class="fixed top-0 -right-full w-[90%] h-full bg-[#121212] z-50 shadow-2xl border-l border-white/10 overflow-y-auto">
    <div class="flex items-center p-5 border-b border-white/10 bg-[#1a1a1a] sticky top-0 z-10">
        <button onclick="toggleOutros()" class="text-gray-400 p-2 -ml-2">
            <i class="fas fa-chevron-right text-xl"></i>
        </button>
        <h2 class="ml-2 text-sm font-bold text-white uppercase tracking-[0.2em]">Ajustes</h2>
    </div>

    <div class="p-4 space-y-4">
        <div class="bg-[#1e1e1e] rounded-2xl overflow-hidden border border-white/5">
            <button onclick="toggleSubmenu('sub-financeiro', this)" class="w-full flex justify-between items-center p-4 text-white">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-blue-500/10 flex items-center justify-center">
                        <i class="fas fa-wallet text-blue-400 text-sm"></i>
                    </div>
                    <span class="text-sm font-medium">Financeiro</span>
                </div>
                <i class="fas fa-chevron-down text-[10px] text-gray-500 transition-transform duration-300 seta"></i>
            </button>
            <div id="sub-financeiro" class="max-height-0 overflow-hidden bg-black/20 text-sm text-gray-400">
                <div id="list-contas" class="space-y-2"></div>
                <div id="list-cartoes" class="space-y-2"></div>
                <div id="list-cat-despesa" class="flex flex-wrap gap-2"></div>
                <div id="list-cat-receita" class="flex flex-wrap gap-2"></div>
            </div>
        </div>

        <div id="area-admin" class="hidden pt-4 border-t border-white/10">
            <p class="text-[10px] font-bold text-gray-500 mb-3 px-1 tracking-widest uppercase text-center">Admin</p>
            <button onclick="abrirGestaoAssinaturas()" class="w-full flex items-center gap-3 p-4 bg-emerald-500/10 text-emerald-400 rounded-2xl border border-emerald-500/20">
                <i class="fas fa-users-cog"></i>
                <span class="font-bold text-xs uppercase tracking-wider">Gestão de Assinaturas</span>
            </button>
        </div>
    </div>
</div>

<script>
    // Função para abrir o painel "Outros" e carregar as informações
    function toggleOutros() {
        const painel = document.getElementById('painel-outros');
        const overlay = document.getElementById('overlay-outros');
        
        if (painel.classList.contains('-right-full')) {
            painel.classList.replace('-right-full', 'right-0');
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.add('opacity-100'), 10);
            
            // CORREÇÃO: Carregar as informações financeiras quando abrir o painel
            renderFinSettings();
        } else {
            painel.classList.replace('right-0', '-right-full');
            overlay.classList.remove('opacity-100');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }
    }

    // Função para expandir/retrair submenus
    function toggleSubmenu(id, btn) {
        const sub = document.getElementById(id);
        const seta = btn.querySelector('.seta');
        
        if (sub.style.maxHeight) {
            sub.style.maxHeight = null;
            if(seta) seta.style.transform = 'rotate(0deg)';
        } else {
            sub.style.maxHeight = sub.scrollHeight + "px";
            if(seta) seta.style.transform = 'rotate(180deg)';
        }
    }

    // Função para renderizar as configurações financeiras
    function renderFinSettings() {
        // Exemplo de dados (você deve integrar com seu state real)
        const state = window.state || {
            usuario: {
                contas: [],
                categorias_despesa: [],
                categorias_receita: []
            },
            financas: {
                cartoes: []
            }
        };

        // Renderizar contas
        const listContas = document.getElementById('list-contas');
        if (listContas) {
            listContas.innerHTML = state.usuario.contas.map(c => `
                <div class="flex justify-between items-center bg-black/20 p-3 rounded-xl border border-white/5">
                    <div class="flex flex-col justify-center">
                        <span class="text-xs font-bold">${c.nome}</span>
                        <span class="text-[8px] text-gray-500 uppercase font-bold tracking-widest mt-0.5">${c.tipo || 'Conta Comum'}</span>
                    </div>
                </div>
            `).join('');
        }

        // Renderizar cartões
        const listCartoes = document.getElementById('list-cartoes');
        if (listCartoes) {
            listCartoes.innerHTML = state.financas.cartoes.map(c => `
                <div class="flex justify-between items-center bg-black/20 p-3 rounded-xl border border-white/5">
                    <div class="flex items-center space-x-3">
                        <div class="w-3 h-3 rounded-full" style="background-color: ${c.cor || '#8b5cf6'}"></div>
                        <div>
                            <span class="text-xs font-bold block">${c.nome}</span>
                            <span class="text-[9px] text-gray-500 uppercase tracking-widest font-bold block">${c.bandeira || 'MASTERCARD'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Renderizar categorias de despesa
        const listCatDespesa = document.getElementById('list-cat-despesa');
        if (listCatDespesa) {
            listCatDespesa.innerHTML = state.usuario.categorias_despesa.map(c => `
                <div class="flex items-center space-x-2 bg-red-500/10 text-red-400 px-3 py-1.5 rounded-lg border border-red-500/20">
                    <span class="text-[10px] font-bold uppercase">${c.nome}</span>
                </div>
            `).join('');
        }

        // Renderizar categorias de receita
        const listCatReceita = document.getElementById('list-cat-receita');
        if (listCatReceita) {
            listCatReceita.innerHTML = state.usuario.categorias_receita.map(c => `
                <div class="flex items-center space-x-2 bg-green-500/10 text-green-400 px-3 py-1.5 rounded-lg border border-green-500/20">
                    <span class="text-[10px] font-bold uppercase">${c.nome}</span>
                </div>
            `).join('');
        }
    }

    // Função para ativar a área admin
    function ativarAdmin() {
        const areaAdmin = document.getElementById('area-admin');
        if (areaAdmin) areaAdmin.classList.remove('hidden');
    }

    // Função placeholder para gestão de assinaturas
    function abrirGestaoAssinaturas() {
        alert('Gestão de Assinaturas - Função a implementar');
    }
</script>

</body>
</html>
